version: '3.8'

# =============================================================================
# Networks
# Only nginx is attached to the public-facing network.
# All other services communicate on the internal bridge only.
# =============================================================================
networks:
  internal:
    driver: bridge
  public:
    driver: bridge

# =============================================================================
# Volumes
# Named volumes are managed by Docker — data persists across container restarts.
# =============================================================================
volumes:
  timescaledb_data:
  clickhouse_data:
  redis_data:
  prometheus_data:
  grafana_data:

# =============================================================================
# Services
# Secrets are injected by Doppler at startup: doppler run -- docker compose up
# No secrets are hardcoded here. All ${VAR} values come from Doppler.
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy & SSL termination. The only service exposed to the internet.
  # Routes: /api/* → fastapi:8000 | /ws/* → fastapi:8000 | /* → nextjs:3000
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - fastapi
      - nextjs
    networks:
      - public
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FastAPI — Main API server, WebSocket hub, Celery task dispatcher.
  # Never exposed directly. Nginx proxies all traffic here.
  # ---------------------------------------------------------------------------
  fastapi:
    build: ./backend
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CLICKHOUSE_URL=http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/${CLICKHOUSE_DB}
      - JWT_SECRET=${JWT_SECRET}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - OANDA_API_KEY=${OANDA_API_KEY}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID}
      - OANDA_ENVIRONMENT=${OANDA_ENVIRONMENT}
      - LIVE_TRADING_ENABLED=false
    volumes:
      - ./backend:/app
    depends_on:
      - timescaledb
      - redis
      - clickhouse
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Celery — Background worker for long-running backtests.
  # Shares the same image/code as fastapi. Scale horizontally if needed.
  # ---------------------------------------------------------------------------
  celery:
    build: ./backend
    command: celery -A core.celery_app worker --loglevel=info --concurrency=2
    expose: []
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CLICKHOUSE_URL=http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/${CLICKHOUSE_DB}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - OANDA_API_KEY=${OANDA_API_KEY}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID}
      - OANDA_ENVIRONMENT=${OANDA_ENVIRONMENT}
    volumes:
      - ./backend:/app
    depends_on:
      - timescaledb
      - redis
      - clickhouse
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Next.js — Frontend SSR application.
  # Never exposed directly. Nginx proxies all public requests here.
  # ---------------------------------------------------------------------------
  nextjs:
    build: ./frontend
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - fastapi
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # TimescaleDB — Primary database. PostgreSQL + time-series + pgvector.
  # Port 5432 is NEVER exposed to the internet.
  # Migrations in ./db/migrations/ run automatically on first start.
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ClickHouse — Columnar analytics database for heavy aggregation queries.
  # Populated by Celery workers after each backtest. Never exposed to internet.
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    expose:
      - "8123"
      - "9000"
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — Price pub/sub, Celery broker, session cache.
  # Port 6379 is NEVER exposed to the internet.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:alpine
    expose:
      - "6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics collection. Scrapes all services every 15 seconds.
  # Accessible only via SSH tunnel on port 9090. Never exposed to internet.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    expose:
      - "9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — Dashboards for system health, live trading, backtests, RAG.
  # Accessible only via SSH tunnel on port 3001. Never exposed to internet.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    expose:
      - "3001"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_HTTP_PORT=3001
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - internal
    restart: unless-stopped
