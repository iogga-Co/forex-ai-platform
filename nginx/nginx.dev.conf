# =============================================================================
# Forex AI Platform — Nginx Dev Configuration (HTTP only, no SSL)
# Used locally via docker-compose.override.yml.
# Production uses nginx.conf with SSL certs from Let's Encrypt.
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # Rate limiting zone — 100 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # WebSocket — /ws/* → FastAPI
        location /ws/ {
            proxy_pass         http://fastapi:8000;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;

            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # REST API — /api/* → FastAPI (rate limited)
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://fastapi:8000;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }

        # Frontend — /* → Next.js
        location / {
            proxy_pass         http://nextjs:3000;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }
    }
}
