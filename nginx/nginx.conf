# =============================================================================
# Forex AI Platform — Nginx Configuration
# Handles SSL termination, rate limiting, and routing to backend services.
# Certs are managed by Let's Encrypt (Certbot) on the VPS.
# =============================================================================

# Rate limiting zone — 100 requests/minute per IP
# Burst of 20 allows short spikes without immediate rejection
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

# WebSocket upgrade map — passes the correct Upgrade header to FastAPI
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# =============================================================================
# HTTP — Redirect all traffic to HTTPS permanently
# =============================================================================
server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt ACME challenge through before redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS — Main server block
# =============================================================================
server {
    listen 443 ssl;
    server_name _;

    # -------------------------------------------------------------------------
    # SSL — Certificates managed by Certbot / Let's Encrypt on the VPS.
    # Paths below match the standard Certbot output directory structure.
    # Replace YOURDOMAIN with your actual domain during VPS provisioning.
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # -------------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                  always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-XSS-Protection         "1; mode=block"                       always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"     always;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # -------------------------------------------------------------------------
    # WebSocket connections — /ws/* → FastAPI WebSocket hub
    # Upgraded before rate limiting so long-lived connections are not throttled
    # -------------------------------------------------------------------------
    location /ws/ {
        proxy_pass         http://fastapi:8000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # -------------------------------------------------------------------------
    # REST API — /api/* → FastAPI
    # Rate limited: 100 req/min per IP, burst of 20
    # -------------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://fastapi:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # -------------------------------------------------------------------------
    # Frontend — All other traffic → Next.js SSR
    # -------------------------------------------------------------------------
    location / {
        proxy_pass         http://nextjs:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }
}
